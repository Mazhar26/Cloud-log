version: '3.9'

services:

  analyzer:
    build: ./analyzer
    ports:
      - "8001:8001"
    environment:
      - LOG_DIR=/app/logs
    volumes:
      - analyzer-logs:/app/logs

  producer:
    build: ./producer
    depends_on:
      - analyzer

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - analyzer

volumes:
  analyzer-logs: