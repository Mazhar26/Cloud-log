name: Cloud Log Monitoring CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  docker-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Analyzer Service
        run: docker build ./analyzer -t analyzer

      - name: Build Producer Service
        run: docker build ./producer -t producer

      - name: Build Frontend Service
        run: docker build ./frontend -t frontend

      - name: CI Pipeline Success
        run: echo "All services built successfully!"